name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

# Required for pushing to gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs-app/package-lock.json

      - name: Install and Build Next.js
        run: |
          cd nextjs-app
          npm ci
          npm run build

      - name: Copy CNAME, sitemap, robots for deployment
        run: |
          if [ -f CNAME ]; then cp CNAME nextjs-app/out/; fi
          if [ -f sitemap.xml ]; then cp sitemap.xml nextjs-app/out/; fi
          if [ -f robots.txt ]; then cp robots.txt nextjs-app/out/; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: nextjs-app/out 